services:
  server:
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: rxflow
      DB_USER: postgres
      DB_PASSWORD: password
      DATABASE_URL: postgres://postgres:password@postgres:5432/rxflow
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: rxflow-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rxflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rxflow"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
